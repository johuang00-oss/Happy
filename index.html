<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Runner: Infinite Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --hud-bg: rgba(10, 5, 20, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050110;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(15, 5, 30, 0.95) 0%, rgba(5, 0, 15, 1) 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-pink);
        }

        .tagline {
            font-size: 1rem;
            color: #b099ff;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-action {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            border: 3px solid var(--neon-blue);
            border-radius: 4px;
            padding: 16px 40px;
            cursor: pointer;
            background-color: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            transition: all 0.2s ease;
            pointer-events: auto;
        }

        .btn-action:hover {
            background-color: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #gameover-overlay { display: none; }
        #gameover-title { color: #ff0055; text-shadow: 0 0 30px #ff0055; }

        #hud-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud-card {
            background: var(--hud-bg);
            border: 2px solid var(--neon-pink);
            padding: 10px 20px;
            border-radius: 6px;
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .hud-card span { color: #fff; margin-left: 5px; }
        
        .mobile-instructions {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #6a569d;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="menu-overlay" class="screen-overlay">
        <h1>BLOCK RUNNER</h1>
        <p class="tagline">Avoid the crimson sector barriers. Shift coordinates. Speed scales infinitely.</p>
        <button class="btn-action" id="start-btn">ENGAGE CORE</button>
        <p class="mobile-instructions">DESKTOP: A/D Keys • MOBILE: Tap Left/Right Screen</p>
    </div>

    <div id="gameover-overlay" class="screen-overlay">
        <h1 id="gameover-title">RUN TERMINATED</h1>
        <p class="tagline" id="summary-metrics">Processing distance calculations...</p>
        <button class="btn-action" id="retry-btn">REBOOT GRID</button>
    </div>

    <div id="hud-overlay">
        <div style="display: flex; justify-content: space-between; width: 100%;">
            <div class="hud-card">SCORE: <span id="score-idx">0</span></div>
            <div class="hud-card">SPEED: <span id="speed-idx">1X</span></div>
        </div>
    </div>

    <script>
        // Wrap everything in window.onload to ensure Chrome sees the canvas before running scripts
        window.onload = function() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');

            let gameActive = false;
            let score = 0;
            let speedMultiplier = 1;
            let gameSpeed = 8;
            
            const LANES = [-1.5, 0, 1.5]; 
            let currentLane = 1; 
            let targetX = LANES[currentLane];
            let playerX = LANES[currentLane]; 

            let obstacles = [];
            let horizonLines = [];
            let spawnTimer = 0;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Keyboard Hook
            window.addEventListener('keydown', e => {
                if (!gameActive) return;
                if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') {
                    if (currentLane > 0) currentLane--;
                }
                if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') {
                    if (currentLane < 2) currentLane++;
                }
                targetX = LANES[currentLane];
            });

            // Touch/Pointer Hook
            window.addEventListener('pointerdown', e => {
                if (!gameActive || e.target.tagName === 'BUTTON') return;
                if (e.clientX < window.innerWidth / 2) {
                    if (currentLane > 0) currentLane--;
                } else {
                    if (currentLane < 2) currentLane++;
                }
                targetX = LANES[currentLane];
            });

            document.getElementById('start-btn').addEventListener('click', bootGame);
            document.getElementById('retry-btn').addEventListener('click', bootGame);

            function bootGame(e) {
                if(e) e.stopPropagation();
                
                document.getElementById('menu-overlay').classList.add('hidden');
                document.getElementById('gameover-overlay').style.display = 'none';
                document.getElementById('hud-overlay').style.display = 'flex';

                currentLane = 1;
                targetX = LANES[currentLane];
                playerX = LANES[currentLane];
                obstacles = [];
                score = 0;
                gameSpeed = 8;
                speedMultiplier = 1;
                spawnTimer = 0;

                    horizonLines.push(i * 40);

            }
