<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RUNNER.EXE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030307;
            font-family: monospace;
            color: #d1d1d6;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(3, 3, 7, 0.95);
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            color: #ff3b30;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .meta-text {
            font-size: 0.9rem;
            color: #8e8e93;
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .trigger-btn {
            background: transparent;
            color: #ff3b30;
            border: 2px solid #ff3b30;
            padding: 12px 36px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.2s;
        }
        .trigger-btn:hover {
            background: rgba(255, 59, 48, 0.1);
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: none;
            justify-content: space-between;
            z-index: 5;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #ff3b30;
            pointer-events: none;
        }
        .hud-item span {
            color: #ffffff;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="boot-screen" class="interface">
        <h1>RUNNER_PROG_V1.0</h1>
        <p class="meta-text">Dodge incoming sector blocks. Speed parameters increment infinitely. Failure terminates system link.</p>
        <button class="trigger-btn" id="init-btn">INITIALIZE CORE</button>
    </div>

    <div id="death-screen" class="interface" style="display: none;">
        <h1>SYSTEM_FAILURE</h1>
        <p class="meta-text" id="final-metrics">Metrics processing...</p>
        <button class="trigger-btn" id="reboot-btn">REBOOT SYSTEM</button>
    </div>

    <div id="hud">
        <div class="hud-item">DISTANCE: <span id="ui-score">00000</span></div>
        <div class="hud-item">VELOCITY: <span id="ui-speed">1.0X</span></div>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');

            let active = false;
            let score = 0;
            let speed = 7;
            const LANES = [-1.6, 0, 1.6];
            let currentLane = 1;
            let playerX = 0;
            let targetX = 0;

            let obstacles = [];
            let terrainLines = [];
            let spawnCooldown = 0;

            function syncSize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', syncSize);
            syncSize();

            // Direct Inputs
            window.addEventListener('keydown', e => {
                if (!active) return;
                if (e.key === 'a' || e.key === 'ArrowLeft') { if (currentLane > 0) currentLane--; }
                if (e.key === 'd' || e.key === 'ArrowRight') { if (currentLane < 2) currentLane++; }
                targetX = LANES[currentLane];
            });

            window.addEventListener('pointerdown', e => {
                if (!active || e.target.tagName === 'BUTTON') return;
                if (e.clientX < window.innerWidth / 2) {
                    if (currentLane > 0) currentLane--;
                } else {
                    if (currentLane < 2) currentLane++;
                }
                targetX = LANES[currentLane];
            });

            document.getElementById('init-btn').addEventListener('click', bootSequence);
            document.getElementById('reboot-btn').addEventListener('click', bootSequence);

            function bootSequence(e) {
                e.stopPropagation();
                document.getElementById('boot-screen').classList.add('hidden');
                document.getElementById('death-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';

                currentLane = 1;
                playerX = LANES[currentLane];
                targetX = LANES[currentLane];
                obstacles = [];
                score = 0;
                speed = 7;
                spawnCooldown = 0;

                terrainLines = [];
                for (let i = 0; i < 20; i++) {
                    terrainLines.push(i * 30);
                }

                active = true;
                requestAnimationFrame(cycle);
            }

            function project(wx, wz, wh = 0) {
                const fov = 300;
                const camH = 150;
                const cx = canvas.width / 2;
                const cy = canvas.height * 0.4;

                if (wz <= 0) wz = 0.01;
                const scale = fov / wz;
                
                return {
                    x: cx + (wx * 100) * scale,
                    y: cy + (camH - wh) * scale,
                    sz: scale
                };
            }

            function cycle() {
                if (!active) return;
                requestAnimationFrame(cycle);

                score += 0.15;
                speed += 0.0015;

                document.getElementById('ui-score').textContent = String(Math.floor(score)).padStart(5, '0');
                document.getElementById('ui-speed').textContent = (speed / 7).toFixed(1) + "X";

                // Background Flush
                ctx.fillStyle = '#030307';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                playerX += (targetX - playerX) * 0.2;
                const horizonY = canvas.height * 0.4;

                // Ground/Sky Matrix Divider
                ctx.fillStyle = '#090911';
                ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

                // Perspective Trajectory Rails
                ctx.strokeStyle = '#1c1c1e';
                ctx.lineWidth = 1;
                const trackEdges = [-2.4, -0.8, 0.8, 2.4];
                trackEdges.forEach(tx => {
                    let n = project(tx - playerX, 20);
                    let f = project(tx - playerX, 500);
                    ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(f.x, f.y); ctx.stroke();
                });

                // Transverse Grid Lines
                for (let i = 0; i < terrainLines.length; i++) {
                    terrainLines[i] -= speed;
                    if (terrainLines[i] <= 10) terrainLines[i] = 500;

                    let leftNode = project(-2.4 - playerX, terrainLines[i]);
                    let rightNode = project(2.4 - playerX, terrainLines[i]);
                    ctx.beginPath(); ctx.moveTo(leftNode.x, leftNode.y); ctx.lineTo(rightNode.x, rightNode.y); ctx.stroke();
                }

                // Spawner Pipeline
                spawnCooldown -= speed;
                if (spawnCooldown <= 0) {
                    obstacles.push({
                        lx: LANES[Math.floor(Math.random() * 3)],
                        z: 500,
                        w: 0.9,
                        h: 50
                    });
                    spawnCooldown = 130 + Math.random() * 80;
                }

                // Obstacle Matrix Update
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let o = obstacles[i];
                    o.z -= speed;

                    if (o.z <= 12) {
                        obstacles.splice(i, 1);
                        continue;
                    }

                    let base = project(o.lx - playerX, o.z, 0);
                    let apex = project(o.lx - playerX, o.z, o.h);

                    let bWidth = o.w * 90 * base.sz;
                    let bHeight = base.y - apex.y;

                    // Proximity Collision Calculation
                    if (o.z > 15 && o.z < 38) {
                        if (Math.abs(playerX - o.lx) < 0.3) {
                            terminate();
                            return;
                        }
                    }

                    if (base.y > horizonY) {
                        ctx.fillStyle = '#2c2c2e';
                        ctx.fillRect(base.x - bWidth / 2, apex.y, bWidth, bHeight);
                        ctx.strokeStyle = '#ff3b30';
                        ctx.lineWidth = Math.max(1, base.sz * 0.3);
                        ctx.strokeRect(base.x - bWidth / 2, apex.y, bWidth, bHeight);
                    }
                }

                // Player Pointer Frame
                const pY = canvas.height * 0.85;
                const pX = canvas.width / 2;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(pX, pY - 15);
                ctx.lineTo(pX - 12, pY + 12);
                ctx.lineTo(pX + 12, pY + 12);
                ctx.closePath();
                ctx.fill();
            }

            function terminate() {
                active = false;
                document.getElementById('hud').style.display = 'none';
                document.getElementById('final-metrics').textContent = `Link severed. Score output: ${Math.floor(score)}.`;
                document.getElementById('death-screen').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
